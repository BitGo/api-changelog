            spendAmount:
              type: string
            spendAmounts:
              type: array
              items:
                type: object
                properties:
                  coinName:
                    type: string
                  amountString:
                    type: string
            payGoFee:
              type: string
            outputs:
              type: array
              items:
                type: object
                properties:
                  address:
                    type: string
                  isPayGo:
                    type: boolean
                  value:
                    type: number
                  wallet:
                    type: string
                  walletV1:
                    type: string
                  baseAddress:
                    type: string
                  enterprise:
                    type: string
                  valueString:
                    type: string
                  data:
                    type: string
