  /api/v2/{coin}/wallet/generate:
    post:
      summary: Generate wallet
      description: |-
        Generate a new wallet for a coin. If you want a wallet to hold tokens, generate a wallet for the native coin of the
        blockchain (e.g. generate an ETH wallet to hold ERC20 tokens).

        Calling this endpoint does all of the following:

        * Creates the user keychain locally on your machine and encrypts it with the provided passphrase (skipped if you pass
        a `userKey`).
        * Creates the backup keychain locally on your machine.
        * Uploads the encrypted user keychain and public backup keychain to BitGo.
        * Creates the BitGo key (and the backup key if you pass `backupXpubProvider`) on the service.
        * Creates the wallet on BitGo with the 3 public keys above.

        ⓘ Many account-based assets, including Ethereum, require you to
        [Fund Gas Tanks](https://developers.bitgo.com/docs/get-started-gas-tanks) to initialize new wallets on chain. Ensure
        your gas tank has a sufficient balance to cover this cost before generating a new wallet.
      operationId: express.wallet.generate
      tags:
        - Express
      x-internal: false
      parameters:
        - name: includeKeychains
          description: Include user, backup and bitgo keychains along with generated wallet
          in: query
          schema:
            type: boolean
            default: false
        - name: coin
          description: A cryptocurrency or token ticker symbol
          in: path
          required: true
          schema:
            allOf:
              - $ref: '#/components/schemas/CoinString'
            example: btc
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Request body for generating a wallet via Express.
              properties:
                label:
                  type: string
                  description: Name the user assigned to the wallet
                  example: My Wallet
                enterprise:
                  allOf:
                    - $ref: '#/components/schemas/EnterpriseIdString'
                  description: Enterprise id. This is required for Ethereum wallets since they can only be created as part of an enterprise
                  example: 59cd72485007a239fb00282ed480da1f
                  pattern: ^[0-9a-f]{32}$
                multisigType:
                  type: string
                  enum:
                    - onchain
                    - tss
                  description: If absent, BitGo uses the default wallet type for the asset.
                type:
                  type: string
                  enum:
                    - hot
                    - cold
                    - custodial
                    - trading
                  description: The type of wallet, defined by key management and signing protocols.
                passphrase:
                  type: string
                  description: Passphrase to be used to encrypt the user key on the wallet
                userKey:
                  type: string
                  description: User provided public key
                backupXpub:
                  type: string
                  description: public part of a key pair
                  example: xpub661MyMwAqRbcGMVhmc7wqQRYMtcX9LAvSj1pjB213y5TsrkV2uuzJjWnjBrT1FUeNWGPjaVm5p7o6jdNcQJrV1cy3a1R8NQ9m7LuYKA8RpH
                backupXpubProvider:
                  type: string
                  enum:
                    - dai
                  description: Optional key recovery service to provide and store the backup key
                disableTransactionNotifications:
                  type: boolean
                  description: Flag for disabling wallet transaction notifications
                passcodeEncryptionCode:
                  type: string
                  description: The passphrase used for decrypting the encrypted wallet passphrase during wallet recovery
                coldDerivationSeed:
                  type: string
                  description: Seed that derives an extended user key or common keychain for a cold wallet.
                gasPrice:
                  type: number
                  description: Gas price to use when deploying an Ethereum wallet
                disableKRSEmail:
                  type: boolean
                  description: Flag for preventing KRS from sending email after creating backup key
                walletVersion:
                  type: number
                  default: 1
                  description: (ETH only) Specify the wallet creation contract version used when creating a wallet contract.
                  minimum: 0
                  maximum: 6
                isDistributedCustody:
                  type: boolean
                  description: True, if the wallet type is a distributed-custodial. If passed, you must also pass the enterprise parameter.
                bitgoKeyId:
                  type: string
                  description: BitGo key ID for self-managed cold MPC wallets.
                  example: 59cd72485007a239fb00282ed480da1f
                  pattern: ^[0-9a-f]{32}$
                commonKeychain:
                  type: string
                  description: Common keychain for self-managed cold MPC wallets.
              required:
                - label
                - enterprise
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpressGenerateWalletResponse1'
