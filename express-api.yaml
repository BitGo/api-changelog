        type:
          type: string
          description: Defines whether or not this Transfer was sent or received by the user
          enum:
            - send
            - receive
        value:
          type: integer
          description: The total value (in base units) sent by this Transfer (may be approximate for ETH and other coins where amounts in base units can exceed 2^53 - 1)
        valueString:
          allOf:
            - $ref: '#/components/schemas/IntegerString'
          description: The total value (in base units) sent by this Transfer represented as a String
        intendedValueString:
          description: A string representation (in base units) of the initial value for the transfer. This is present because when a transaction fails on chain, its value is mutated to be zero. This string is immutable and will always be the intended value of the initial transfer regardless of the final state of the transaction.
          allOf:
            - $ref: '#/components/schemas/IntegerString'
        baseValue:
          type: integer
          description: The value (in base units) sent by this transfer, excluding network fees. BitGo is deprecating this field in the future. Instead, use baseValueWithoutFees.
        baseValueString:
          allOf:
            - $ref: '#/components/schemas/IntegerString'
          description: The value (in base units) sent by this transfer, excluding network fees represented as a string. BitGo is deprecating this field in the future. Instead, use baseValueWithoutFees.
        baseValueWithoutFees:
          type: integer
          description: The value (in base units) sent by this transfer excluding network fees.
        baseValueWithoutFeesString:
          allOf:
            - $ref: '#/components/schemas/IntegerString'
          description: The value (in base units) sent by this transfer, excluding network fees, represented as a string
        feeString:
          type: string
          description: The Transfer's fee (in base units) represented as a String
        payGoFee:
          type: integer
          description: The Transfer's BitGo fee (in base units)
        payGoFeeString:
          type: string
          description: The Transfer's BitGo fee (in base units) represented as a String
        usd:
          type: number
          description: The amount of USD of this Transfer (will be negative if it's a send)
        usdRate:
          type: number
          description: The USD price at the time this Transfer was created
        state:
          $ref: '#/components/schemas/TransferState'
        tags:
          type: array
          description: The tags to be used on this Transfer (used in Policies)
          items:
            $ref: '#/components/schemas/Id'
        history:
          type: array
          description: An audit log of events that have happened to the Transfer during its lifecycle
          items:
            type: object
            properties:
              date:
                type: string
                format: date-time
                description: The date of this history object
              user:
                $ref: '#/components/schemas/Id'
              action:
                type: string
                enum:
                  - created
                  - signed
                  - unconfirmed
                  - confirmed
                  - approved
                  - commented
                  - removed
                  - failed
                  - rejected
              comment:
                type: string
                description: If this history object is of action `commented`, this is the comment from the user
        comment:
          type: string
          description: A comment from the user
        vSize:
          type: integer
          description: The size of the transaction
        coinSpecific:
          type: object
          description: Transfer fields specific to each coin type
        sequenceId:
          type: string
          description: |
            A `sequenceId` is a unique and arbitrary wallet identifier applied to transfers and transactions at creation. It is optional but highly recommended. With a `sequenceId` you can easily reference transfers and transactions&mdash;for example, to safely retry sending. Because the system only confirms one send request per `sequenceId` (and fails all subsequent attempts), you can retry sending without the risk of double spending. The `sequenceId` is only visible to users on the wallet and is not shared publicly.
        consolidateId:
          $ref: '#/components/schemas/Id'
          description: Consolidation ID if this transfer is part of a consolidation
        txRequestId:
          type: string
          description: Associated transaction request ID
        goStakingRequestId:
          type: string
          description: Associated GO staking request ID
        subType:
          type: string
          description: Transfer subtype
          enum:
            - ofc_withdrawal
            - ofc_deposit
            - ofc_unstake
            - ofc_stake
            - ofc_book_transfer
        feeCoin:
          type: string
          description: The coin used to pay the fee (for cross-chain transactions)
        instant:
          type: boolean
          description: Whether this is an instant transaction
        instantId:
          type: string
          description: The instant transaction ID if applicable
        isFee:
          type: boolean
          description: Whether this transfer represents a fee
        isReward:
          type: boolean
          description: Whether this transfer represents a staking reward
        isUnlock:
          type: boolean
          description: Whether this transfer represents an unlock operation
        metadata:
          type: array
          description: Additional metadata associated with the transfer
          items:
            type: object
            properties:
              key:
                type: string
              value:
                type: string
        sendAccounting:
          type: array
          description: Accounting breakdown for send transactions
          items:
            type: object
            properties:
              type:
                type: string
              amountString:
                type: string
              nOuts:
                type: integer
              amount:
                type: integer
              id:
                type: string
        createdTime:
          type: string
          format: date-time
          description: The time this transfer was created
        approvedTime:
          type: string
          format: date-time
          description: The time this transfer was approved
        rejectedTime:
          type: string
          format: date-time
          description: The time this transfer was rejected
        signedTime:
          type: string
          format: date-time
          description: The time this transfer was signed
        unconfirmedTime:
          type: string
          format: date-time
          description: The time this transfer became unconfirmed
        confirmedTime:
          type: string
          format: date-time
          description: The time this transfer was confirmed
        removedTime:
          type: string
          format: date-time
          description: The time this transfer was removed
        commentedTime:
          type: string
          format: date-time
          description: The time this transfer was commented on
        failedTime:
          type: string
          format: date-time
          description: The time this transfer failed
        regeneratedTime:
          type: string
          format: date-time
          description: The time this transfer was regenerated
        replacedTime:
          type: string
          format: date-time
          description: The time this transfer was replaced
        replacingTime:
          type: string
          format: date-time
          description: The time this transfer started replacing another
        abandonedTime:
          type: string
          format: date-time
          description: The time this transfer was abandoned
        signedDate:
          type: string
          format: date-time
          description: The date this transfer was signed (legacy field)
        customerApprovedTime:
          type: string
          format: date-time
          description: The time this transfer was approved by the customer (trust transfers)
        idVerificationTime:
          type: string
          format: date-time
          description: The time identity verification was completed (trust transfers)
        trustSignedTime:
          type: string
          format: date-time
          description: The time this transfer was signed by trust (trust transfers)
        trustFinalApprovalTime:
          type: string
          format: date-time
          description: The time this transfer received final trust approval (trust transfers)
        walletLabel:
          type: string
          description: Label of the wallet associated with this transfer
        enterpriseName:
          type: string
          description: Name of the enterprise associated with this transfer
        elliptic:
          type: string
          description: Elliptic risk score information (trust transfers)
        senderInformationVerified:
          type: boolean
          description: Whether sender information has been verified (trust transfers)
        buildParams:
          type: object
          description: Parameters used to build the transaction
          additionalProperties: true
        entries:
          type: array
          description: An array of objects describing the change in address balances made as a result of this Transfer
          items:
            type: object
            properties:
              address:
                type: string
                description: An address affected by this Transfer
                example: 2NAUwNgXaoFj2VVnSEvNLGuez8CfdU2UCMZ
              wallet:
                allOf:
                  - $ref: '#/components/schemas/Id'
                description: Only visible when the user has access to the wallet
              value:
                type: integer
                description: The change (in base units) in the address's balance
              valueString:
                allOf:
                  - $ref: '#/components/schemas/IntegerString'
                description: The change (in base units) in the address's balance represented as a String
              isChange:
                type: boolean
                description: True if this address is a change address (only exists for UTXO coins) and if this is a `sent` Transfer
              isPayGo:
                type: boolean
                description: True if this address is the BitGo PayGo wallet
              token:
                type: string
                description: If this is a token entry, the token's symbol
                example: omg
              label:
                type: string
                description: Names of addresses given by the user.
              failed:
                type: boolean
                description: true if this entry is failed.
              associatedNativeCoinAddress:
                type: string
                description: The native coin receive address associated with the solana ATA address. This is currently present only for BitGo addresses.
              memo:
                type: string
                description: Memo associated with this entry. Only available for STX, EOS, SOL, NEAR, and POLYX. For other coins (XLM, XRP, Cosmos-based, TON), memo is stored at the transaction level or appended to the address.
              type:
                type: string
                description: The type of this entry (e.g., transfer, fee, contract_call).
              nftId:
                type: string
                description: NFT ID associated with this entry. Only present for NFT transfers.
              nftSymbol:
                type: string
                description: NFT symbol associated with this entry. Only present for NFT transfers.
          required:
            - address
            - valueString
        usersNotified:
          type: boolean
          description: Whether BitGo already sent notifications to the users of the transfer wallet
        label:
          type: string
          description: Address labels (if any) from entries concatenated.
        replaces:
          type: array
          description: Transaction IDs that this transfer replaces.
          items:
            type: string
        replacedBy:
          type: array
          description: Transaction IDs that replace this transfer.
          items:
            type: string
        riskIndicators:
          type: array
          description: Risk indicators detected on this transfer (e.g. SELFDESTRUCT opcode). Transfers with risk indicators will not trigger webhook or email notifications.
          items:
            type: string
            enum:
              - SELFDESTRUCT
      required:
        - id
        - coin
        - wallet
        - txid
        - height
        - date
        - confirmations
        - type
        - valueString
        - usd
        - usdRate
        - state
        - tags
        - history
        - comment
        - coinSpecific
    TransferState:
      type: string
      description: |
        The state of the transfer. Includes the following:
        - `confirmed`: The transfer is confirmed on chain.
        - `failed`: BitGo failed to confirm the transfer on chain. You must retry the transaction.
        - `initialized`: The initial state when creating a transfer.
        - `pendingApproval`: The transfer requires admin approval to proceed.
        - `rejected`: The transfer was rejected by an admin.
        - `removed`: A network re-org occurred, causing the confirmed transfer to be removed from the blockchain.
        - `replaced`: The transfer was stuck due to having a low fee and was replaced by a new transfer with a higher fee.
        - `signed`: The transfer was approved by an admin (if required) and then signed by BitGo.
        - `unconfirmed`: The signed transaction was sent to the network, and is pending on-chain validation.
      example: confirmed
      enum:
        - confirmed
        - failed
        - initialized
        - pendingApproval
        - rejected
        - removed
        - replaced
        - signed
        - unconfirmed
    TransferTokenIntent:
      title: TransferTokenIntent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - transferToken
              description: Must be "transferToken".
          required:
            - intentType
        - $ref: '#/components/schemas/BaseIntent'
        - $ref: '#/components/schemas/BaseIntentWithTokenRecipients'
    TransferTokenIntent1:
      title: Transfer Token
      allOf:
        - $ref: '#/components/schemas/BaseIntent2'
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - transferToken
            recipients:
              type: array
              items:
                $ref: '#/components/schemas/RecipientEntry1'
    Trustline:
      type: object
      properties:
        token:
          type: string
          description: One of the supported coin types for Stellar tokens listed in [Coin-specific-implementation](#tag/Coin-specific-implementation)
          example: txlm:BST-GBQTIOS3XGHB7LVYGBKQVJGCZ3R4JL5E4CBSWJ5ALIJUHBKS6263644L
        action:
          enum:
            - add
            - remove
        limit:
          allOf:
            - $ref: '#/components/schemas/IntegerString'
          description: String representation of the amount to limit in base units (stroops)
    TrxClaimRewardsIntent:
      title: TRX Claim Rewards Intent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - stakeClaimRewards
              description: Must be `"stakeClaimRewards"`.
            ownerAddress:
              type: string
              description: Tron address of the wallet owner; must match the wallet's root address.
          required:
            - intentType
            - ownerAddress
        - $ref: '#/components/schemas/BaseStakeIntent'
        - $ref: '#/components/schemas/BaseIntentWithAmount'
      description: |-
        Claim accumulated Tron staking rewards (WithdrawBalance) to the owner's
        address. The reward balance must be non-zero; the handler does not verify
        the amount before submitting the transaction. Valid on TRX and TTRX.
    TrxDelegateResourceIntent:
      title: TRX Delegate Resource Intent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - delegateResource
              description: Must be `"delegateResource"`.
            ownerAddress:
              type: string
              description: Tron address of the resource owner delegating their staked resources.
            receiverAddress:
              type: string
              description: Tron address of the account receiving the delegated resources; must be an active Tron account.
            resource:
              type: string
              enum:
                - BANDWIDTH
                - ENERGY
              description: 'The resource type to delegate: `BANDWIDTH` or `ENERGY`.'
          required:
            - intentType
            - ownerAddress
            - receiverAddress
            - resource
        - $ref: '#/components/schemas/BaseStakeIntent'
        - $ref: '#/components/schemas/BaseIntentWithAmount'
      description: |-
        Delegate staked BANDWIDTH or ENERGY resources to another Tron address
        (DelegateResourceContract). The owner must have sufficient staked
        resources; the receiver address must be an active Tron account; and the
        amount must be at least 1 TRX (1,000,000 sun). Valid on TRX and TTRX.
    TrxDelegateResourceIntent1:
      title: TRX Delegate Resource Intent
      description: |
        Delegates TRON ENERGY or BANDWIDTH from the wallet root address to a receiver address.
        For TRX (`trx`, `ttrx`) MPC (TSS) wallets only — use with [Create transaction request](/reference/v2wallettxrequestcreate).
        Minimum delegation amount is 1 TRX (1,000,000 sun).
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - delegateResource
            stakingRequestId:
              type: string
            ownerAddress:
              type: string
              description: TRON address delegating resources (typically the wallet root address)
            receiverAddress:
              type: string
              description: TRON address receiving the delegated ENERGY or BANDWIDTH
            amount:
              $ref: '#/components/schemas/Amount1'
            resource:
              type: string
              enum:
                - ENERGY
                - BANDWIDTH
          required:
            - intentType
            - stakingRequestId
            - ownerAddress
            - receiverAddress
            - amount
            - resource
        - $ref: '#/components/schemas/BaseIntent1'
    TrxFreezeIntent:
      title: TRX Freeze Intent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - stake
              description: Must be `"stake"`.
            validatorAddress:
              type: string
              description: Tron address of the Super Representative the user intends to vote for after freezing. Stored by the staking service to auto-construct the subsequent vote intent; not consumed by wallet-platform's freeze transaction builder.
            ownerAddress:
              type: string
              description: Tron address of the wallet owner staking the TRX.
            resource:
              type: string
              enum:
                - BANDWIDTH
                - ENERGY
              description: 'The resource type to obtain by staking: `BANDWIDTH` or `ENERGY`.'
          required:
            - intentType
            - validatorAddress
            - ownerAddress
            - resource
        - $ref: '#/components/schemas/BaseStakeIntent'
        - $ref: '#/components/schemas/BaseIntentWithAmount'
      description: |-
        Stake (freeze) TRX to obtain BANDWIDTH or ENERGY using the Tron Stake V2
        protocol (FreezeBalanceV2). The spendable balance must be greater than or
        equal to the freeze amount plus the transaction fee.
        Valid on TRX and TTRX.
    TrxUndelegateResourceIntent:
      title: TRX Undelegate Resource Intent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - undelegateResource
              description: Must be `"undelegateResource"`.
            ownerAddress:
              type: string
              description: Tron address of the resource owner reclaiming the delegated resources.
            receiverAddress:
              type: string
              description: Tron address of the account from which the resources are being reclaimed.
            resource:
              type: string
              enum:
                - BANDWIDTH
                - ENERGY
              description: 'The resource type to reclaim: `BANDWIDTH` or `ENERGY`.'
          required:
            - intentType
            - ownerAddress
            - receiverAddress
            - resource
        - $ref: '#/components/schemas/BaseStakeIntent'
        - $ref: '#/components/schemas/BaseIntentWithAmount'
      description: |-
        Reclaim previously delegated BANDWIDTH or ENERGY resources from a
        receiver address (UnDelegateResourceContract). The undelegatable balance
        must be sufficient to cover the requested amount.
        Valid on TRX and TTRX.
    TrxUndelegateResourceIntent1:
      title: TRX Undelegate Resource Intent
      description: |
        Undelegates previously delegated TRON ENERGY or BANDWIDTH from the wallet root address.
        For TRX (`trx`, `ttrx`) MPC (TSS) wallets only — use with [Create transaction request](/reference/v2wallettxrequestcreate).
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - undelegateResource
            stakingRequestId:
              type: string
            ownerAddress:
              type: string
              description: TRON address that delegated the resources (typically the wallet root address)
            receiverAddress:
              type: string
              description: TRON address from which resources are being undelegated
            amount:
              $ref: '#/components/schemas/Amount1'
            resource:
              type: string
              enum:
                - ENERGY
                - BANDWIDTH
          required:
            - intentType
            - stakingRequestId
            - ownerAddress
            - receiverAddress
            - amount
            - resource
        - $ref: '#/components/schemas/BaseIntent1'
    TrxUnfreezeIntent:
      title: TRX Unfreeze Intent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - unstake
              description: Must be `"unstake"`.
            ownerAddress:
              type: string
              description: Tron address of the wallet owner unstaking the TRX.
            resource:
              type: string
              enum:
                - BANDWIDTH
                - ENERGY
              description: 'The resource type to unstake: `BANDWIDTH` or `ENERGY`.'
          required:
            - intentType
            - ownerAddress
            - resource
        - $ref: '#/components/schemas/BaseStakeIntent'
        - $ref: '#/components/schemas/BaseIntentWithAmount'
      description: |-
        Unstake (unfreeze) previously staked TRX using the Tron Stake V2
        protocol (UnfreezeBalanceV2). Initiates the unstaking waiting period;
        use the `claim` intent to withdraw the TRX after the waiting period
        has elapsed. Valid on TRX and TTRX.
    TrxVoteIntent:
      title: TRX Vote Intent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - voteDelegation
              description: Must be `"voteDelegation"`.
            validatorAddress:
              type: string
              description: Tron address of the Super Representative selected during the freeze step. Carried forward by the staking service so the user does not need to re-select a validator; not consumed by wallet-platform's vote transaction builder (which reads the `votes` array instead).
            ownerAddress:
              type: string
              description: Tron address of the wallet owner casting the votes.
            votes:
              type: array
              items:
                type: object
                properties:
                  vote_address:
                    type: string
                    description: Tron address of the Super Representative (SR) receiving the votes.
                  vote_count:
                    type: string
                    description: Number of votes to allocate to this SR, as a decimal string.
                required:
                  - vote_address
                  - vote_count
                description: List of vote allocations. Each entry specifies a Super Representative address and the number of votes to assign. Total votes must not exceed available Tron Power.
          required:
            - intentType
            - validatorAddress
            - ownerAddress
            - votes
        - $ref: '#/components/schemas/BaseStakeIntent'
        - $ref: '#/components/schemas/BaseIntentWithAmount'
      description: |-
        Cast votes for Tron Super Representatives (SR) using accumulated Tron
        Power (VoteWitnessContract). The total vote count across all entries must
        not exceed the available Tron Power. Each staked TRX provides 1 unit of
        Tron Power. Valid on TRX and TTRX.
    TrxWithdrawExpireUnfreezeIntent:
      title: TRX Withdraw Expire Unfreeze Intent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - claim
              description: Must be `"claim"`.
            ownerAddress:
              type: string
              description: Tron address of the wallet owner withdrawing the unstaked TRX.
          required:
            - intentType
            - ownerAddress
        - $ref: '#/components/schemas/BaseStakeIntent'
        - $ref: '#/components/schemas/BaseIntentWithAmount'
      description: |-
        Withdraw previously unstaked TRX after the Tron unstaking waiting period
        has elapsed (WithdrawExpireUnfreeze). The handler does not verify that
        the waiting period has passed before submitting the transaction. Use the
        `unstake` intent to begin the unstaking process. Valid on TRX and TTRX.
    TxAddress:
