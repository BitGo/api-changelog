                    type: string
                    description: Address of the validator
              - title: optional
                type: object
                properties:
                  type:
                    type: string
                    default: optional
                    description: Type of argument. Use the default.
                  val:
                    type: string
                    description: The number of cycles that the delegation will last. This is a mandatory field that must be greater than 1.
              - title: optional
                type: object
                properties:
                  type:
                    type: string
                    default: optional
                    description: Type of argument. Use the default.
                  val:
                    type: object
                    properties:
                      type:
                        type: string
                        default: tuple
                        description: Type of argument. Use the default.
                      val:
                        type: array
                        description: The 2 objects are required and in the order expressed.
                        items:
                          anyOf:
                            - title: hash
                              type: object
                              properties:
                                key:
                                  type: string
                                  default: hashbytes
                                  description: Type of argument. Use the default.
                                type:
                                  type: string
                                  default: buffer
                                  description: Type of argument. Use the default.
                                val:
                                  type: string
                                  description: The BTC Address hash.
                            - title: version
                              type: object
                              properties:
                                key:
                                  type: string
                                  default: version
                                  description: Type of argument. Use the default.
                                type:
                                  type: string
                                  default: buffer
                                  description: Type of argument. Use the default.
                                val:
                                  type: string
                                  description: The BTC Address version.
