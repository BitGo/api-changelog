  schemas:
    AccelerationIntent:
      title: AccelerationIntent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - acceleration
              description: Must be "acceleration".
            txid:
              type: string
              description: Transaction hash (0x-prefixed) of the pending transaction to accelerate.
            senderAddress:
              type: string
              description: Sender address of the original transaction.
          required:
            - intentType
            - txid
        - $ref: '#/components/schemas/BaseIntent'
      description: |-
        Base codec for acceleration intents. Replaces a stuck pending EVM transaction
        with a higher-fee version to accelerate confirmation (replace-by-fee).
    AccelerationIntent1:
      title: AccelerationIntent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - acceleration
            txid:
              type: string
          required:
            - intentType
            - txid
        - $ref: '#/components/schemas/BaseIntent1'
    AcceptShareResponse:
      title: AcceptShareResponse
      type: object
      description: Response from accepting a wallet share
      properties:
        changed:
          type: boolean
          description: |-
            Indicates whether the share state was changed by this operation.
            true: The share was successfully accepted (state changed from pending to accepted).
            false: The share was already in the target state (already accepted).
        state:
          type: string
          description: |-
            Current state of the wallet share after the operation.
            Possible values: 'accepted', 'rejected', 'active', 'pendingapproval', 'canceled'
            Should be 'accepted' after a successful acceptance.
      required:
        - changed
        - state
    AccountBaseBuildOptions:
      title: AccountBaseBuildOptions
      type: object
      properties:
        nonce:
          oneOf:
            - type: string
            - type: number
          description: Override the on-chain nonce for this transaction.
    AccountBaseBuildOptions1:
