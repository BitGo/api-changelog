        rootAddress:
          type: string
          description: Root address of the wallet
          example: GCTTCPH4IIDK7P72FFAEJ3ZFN6WDHJH6GGMRPHPM56ZWGIQ7B3XTIJAM
    AddressLabel:
      type: string
      nullable: true
      example: Bob's Hot Wallet Address
      maxLength: 250
