        - ecdsaMPCv2Round1
        - ecdsaMPCv2Round2
        - ecdsaMPCv2Round3
        - eddsaMPCv2Round1
        - eddsaMPCv2Round2
        - eddsaMPCv2Round3
        - readyToCombineShares
        - signed
        - held
        - delivered
        - invalidSignature
        - rejected
      description: |-
