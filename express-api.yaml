    ExpressIsWalletAddressRequest:
      type: object
      description: Request body for verifying if an address belongs to a wallet
      required:
        - address
        - keychains
      properties:
        address:
          type: string
          description: The address to verify
        keychains:
          type: array
          items:
            type: object
            description: |
              Keychains for cryptographic verification
              Can be retrieved from GET /api/v2/{coin}/key/{id}
            properties:
              pub:
                type: string
              ethAddress:
                type: string
                description: Ethereum address (required for V1, V2, V4 ETH wallets base address verification)
              commonKeychain:
                type: string
                description: Common keychain (required for  wallets version 3, 5, 6)
            required:
              - pub
        baseAddress:
          type: string
          description: Base address of the wallet (wallet.coinSpecific.baseAddress)
        walletVersion:
          type: number
          description: Wallet version (wallet.coinSpecific.walletVersion)
        index:
          oneOf:
            - type: number
            - type: string
          description: |
            Address derivation index
            For Base Address verification, set index to 0
        coinSpecific:
          type: object
          description: Coin-specific address data
          properties:
            baseAddress:
              type: string
              description: Base address (wallet.coinSpecific.baseAddress)
            feeAddress:
              type: string
              description: Fee address for v4 forwarders (wallet.coinSpecific.feeAddress)
            forwarderVersion:
              type: number
              description: Forwarder version (address.coinSpecific.forwarderVersion, required for forwarder addresses only)
            salt:
              type: string
              description: |
                Salt for address derivation
                ForwarderAddress: address.coinSpecific.salt
                BaseAddress: wallet.coinSpecific.salt
        impliedForwarderVersion:
          type: number
          description: Implied forwarder version
        format:
          type: string
          description: Format for the address
        rootAddress:
          type: string
          description: Root address for coins that use root address
