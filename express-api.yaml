    DateTime:
      type: string
      format: date-time
      example: {}
    DefaultChangeAddressType:
      type: string
      example: p2wsh
      nullable: true
      enum:
        - p2sh
        - p2shP2wsh
        - p2wsh
        - p2tr
        - p2trMusig2
