        - 10
        - 11
        - 20
        - 21
        - 30
        - 31
        - 40
        - 41
    ChangeAddressTypes:
      type: array
      items:
        $ref: '#/components/schemas/AddressType'
      description: The address types for the change address. Order by preference and BitGo uses the first available. Any subset of `p2sh`, `p2shP2wsh`, `p2wsh`, `p2tr` or `p2trMusig2`.
    Coin:
