            validatorAddress:
              type: string
              description: Bech32 validator address to undelegate tokens from (e.g. cosmosvaloper1...).
            recipients:
              type: array
              items:
                type: object
                properties:
                  address:
                    $ref: '#/components/schemas/Address'
                  amount:
                    $ref: '#/components/schemas/Amount'
                  data:
                    $ref: '#/components/schemas/optionalString'
                required:
                  - address
                  - amount
                description: Optional list of validator–amount pairs for multi-validator undelegation. When provided, overrides validatorAddress and amount.
          required:
            - intentType
            - validatorAddress
        - $ref: '#/components/schemas/BaseStakeIntent'
        - $ref: '#/components/schemas/BaseIntentWithAmount'
      description: |-
        Undelegate (unstake) tokens from one or more validators on a
        Cosmos-family chain. Tokens enter the chain's unbonding period and are
        not immediately available. Use `validatorAddress` and `amount` for a
        single validator, or `recipients` for multi-validator undelegation.
