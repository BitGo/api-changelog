        witnessScript:
          type: string
          description: The segwit Script program used to cryptographically verify spending this unspent
          example: 52210351311cd81144e6cbdba561d24dfc22644cb02d053339d4beace03231b3be4f372103a8d0c1a375b9ee1a2411f9f8e18373be7f228b18260f63bbfca48809170ed08b2103c3bd8bd074657bbe9ee6714b31a4a54b6fd5b5cda0e1030122f9bf46b5034f6b53ae
        isSegwit:
          type: boolean
    UnspentId:
      type: string
      description: The id of the unspent in the form <txid>:<tx_index>
      example: 003f688cc349f1fca8ac5ffa21671ca911b6ef351085c60733ed8c2ebf162cb8:2
    UnstakeIntent:
      title: UnstakeIntent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - unstake
          required:
            - intentType
        - $ref: '#/components/schemas/BaseStakeIntent'
    UnstakeIntent1:
      title: UnstakeIntent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - unstake
          required:
            - intentType
        - $ref: '#/components/schemas/BaseStakeIntent1'
    UnstakeIntent2:
      title: Generic Unstake
      allOf:
        - $ref: '#/components/schemas/BaseStakeIntent2'
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - unstake
          required:
            - intentType
    UnsupportedTokenRecipientEntryItem:
      title: UnsupportedTokenRecipientEntryItem
      type: object
      properties:
        tokenContractAddress:
          $ref: '#/components/schemas/optionalString'
        decimals:
          $ref: '#/components/schemas/optionalNumber'
    UserKeychainType:
      title: UserKeychainType
      type: object
      properties:
        id:
          type: string
          description: Keychain ID
          example: 59cd72485007a239fb00282ed480da1f
          pattern: ^[0-9a-f]{32}$
        source:
          type: string
          description: Party that created the key
          example: user
        type:
          type: string
          description: Keychain type (e.g. "independent" for onchain, "tss" for MPC)
        pub:
          type: string
          description: Public part of a key pair (onchain wallets)
          example: xpub661MyMwAqRbcGMVhmc7wqQRYMtcX9LAvSj1pjB213y5TsrkV2uuzJjWnjBrT1FUeNWGPjaVm5p7o6jdNcQJrV1cy3a1R8NQ9m7LuYKA8RpH
        ethAddress:
          type: string
          description: Ethereum address corresponding to this keychain (onchain wallets)
          example: '0xf5b7cca8621691f9dde304cb7128b6bb3d409363'
        coin:
          type: string
          description: Asset ticker for this keychain (onchain wallets)
        commonKeychain:
          type: string
          description: Common keychain string (TSS wallets)
      required:
        - id
        - source
        - type
    UtxoFeeInfo:
      title: UTXO
      type: object
      description: feeInfo (UTXO)
      properties:
        size:
          type: integer
          description: Estimated size of the transaction in bytes
          example: 776
        fee:
          type: integer
          description: Estimated fee in base unit for the transaction
          example: 38800
        feeRate:
          allOf:
            - $ref: '#/components/schemas/IntegerOrString'
            - example: 10000
          description: |
            Custom minimum fee rate in a coin's base unit per kilobyte (or virtual kilobyte)--for example, satoshis per kvByte or microAlgos per kByte. If the applied `feeRate` does not meet a coin's required minimum transaction fee amount, the minimum is still applied (for example, 1000 sat/kvByte or a flat 1000 microAlgos).
        payGoFee:
          type: integer
          description: BitGo fee of the transaction (in base units)
          example: 0
        payGoFeeString:
          type: integer
          description: BitGo fee of the transaction (in base units) represented as a String
          example: '0'
    UtxoTransactionFormat:
      type: string
      description: |-
        [UTXO only] Format of the returned transaction hex serialization.
        `legacy` for serialized transaction in custom bitcoinjs-lib format. `psbt` for BIP174 serialized transaction
      enum:
        - legacy
        - psbt
        - psbt-lite
      default: legacy
      example: psbt
    UtxoTxInfo:
      title: UTXO
      type: object
      description: txInfo (UTXO)
      properties:
        changeAddresses:
          type: array
          items:
            $ref: '#/components/schemas/AddressString3'
        nOutputs:
          type: integer
          description: Number of outputs
          example: 2
        nP2SHInputs:
          type: integer
          example: 0
        nSegwitInputs:
          type: integer
          example: 1
        unspents:
          type: array
          items:
            $ref: '#/components/schemas/Unspent'
        walletAddressDetails:
          $ref: '#/components/schemas/Address2'
    ValidationError:
      allOf:
        - $ref: '#/components/schemas/GeneralError'
        - type: object
          properties:
            failedValidations:
              type: object
    ValidatorRegistrationIntent:
      title: ValidatorRegistrationIntent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - validatorRegistration
          required:
            - intentType
        - $ref: '#/components/schemas/BaseStakeIntent'
    VersionResponseType:
      title: VersionResponseType
      type: object
      properties:
        version:
          type: string
        name:
          type: string
      required:
        - version
        - name
    VetBurnNFTIntent:
      title: VetBurnNFTIntent
      allOf:
        - $ref: '#/components/schemas/UnstakeIntent'
        - $ref: '#/components/schemas/VetUnstakeCommonFields'
      description: |-
        Burn a VeChain staking NFT to complete the unstaking withdrawal and reclaim
        staked VET. This is the second (final) step in the basic unstaking flow —
        must be preceded by `undelegate`. No VET is spent by the sender; gas is paid
        by the enterprise gas tank (VTHO).
    VetDecreaseStakeIntent:
      title: VetDecreaseStakeIntent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - decreaseStake
              description: Must be "decreaseStake".
            validatorAddress:
              type: string
              description: Address of the validator whose staked position is being reduced.
              minLength: 1
            stakingContractAddress:
              type: string
              description: Address of the VeChain staking contract holding the position.
              minLength: 1
          required:
            - intentType
            - validatorAddress
            - stakingContractAddress
        - $ref: '#/components/schemas/BaseStakeIntent'
        - $ref: '#/components/schemas/BaseIntentWithAmount'
      description: |-
        Withdraw a portion of VET staked with a VeChain validator, reducing the
        position size. The specified amount is returned to the sender's wallet. No
        VET is spent — gas is paid by the enterprise gas tank (VTHO).
    VetDelegateIntent:
      title: VetDelegateIntent
      allOf:
        - type: object
          properties:
            tokenId:
              type: string
              description: ID of the staking NFT to delegate to the validator.
              minLength: 1
            stakingContractAddress:
              type: string
              description: Address of the VeChain staking (Stargate) contract that holds the NFT.
              minLength: 1
            validatorAddress:
              type: string
              description: Address of the validator to delegate the staking NFT to.
              minLength: 1
          required:
            - tokenId
            - stakingContractAddress
            - validatorAddress
        - $ref: '#/components/schemas/DelegateIntent'
      description: |-
        Delegate a VeChain staking NFT to a validator, granting the validator voting
        and reward rights for that position. No VET is spent — this is an NFT
        assignment operation, not a financial transfer. Gas is paid by the enterprise
        gas tank (VTHO).
    VetExitDelegationIntent:
      title: VetExitDelegationIntent
      allOf:
        - $ref: '#/components/schemas/UndelegateIntent'
        - $ref: '#/components/schemas/VetUnstakeCommonFields'
      description: |-
        Remove validator delegation for a VeChain staking NFT, returning it to an
        undelegated state. This is the first step in the full unstaking flow — must
        precede `unstake` (burn NFT). No VET is spent; gas is paid by the enterprise
        gas tank (VTHO).
    VetIncreaseStakeIntent:
      title: VetIncreaseStakeIntent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - increaseStake
              description: Must be "increaseStake".
            validatorAddress:
              type: string
              description: Address of the validator whose staked position is being increased.
              minLength: 1
            stakingContractAddress:
              type: string
              description: Address of the VeChain staking contract holding the existing position.
              minLength: 1
          required:
            - intentType
            - validatorAddress
            - stakingContractAddress
        - $ref: '#/components/schemas/BaseStakeIntent'
        - $ref: '#/components/schemas/BaseIntentWithAmount'
      description: |-
        Increase the VET staked with an existing VeChain validator by depositing
        additional VET into the staking contract. The sender must have sufficient VET
        balance. Gas is paid by the enterprise gas tank (VTHO).
    VetSignalExitIntent:
      title: VetSignalExitIntent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - signalExit
              description: Must be "signalExit".
            validatorAddress:
              type: string
              description: Address of the validator node whose position is being exited.
              minLength: 1
            stakingContractAddress:
              type: string
              description: Address of the VeChain staking contract where the validator position is held.
              minLength: 1
          required:
            - intentType
            - validatorAddress
            - stakingContractAddress
        - $ref: '#/components/schemas/BaseStakeIntent'
      description: |-
        Signal the intent to exit a VeChain validator staking position, initiating
        the cooldown period. This is the first step in the validator unstake flow —
        must be followed by `withdrawStake` after the cooldown expires. No VET is
        spent; gas is paid by the enterprise gas tank (VTHO).
    VetStakeClaimRewardsIntent:
      title: VetStakeClaimRewardsIntent
      allOf:
        - type: object
          properties:
            tokenId:
              type: string
              description: ID of the staking NFT whose accumulated VTHO rewards will be claimed.
              minLength: 1
            stakingContractAddress:
              type: string
              description: Address of the VeChain staking (Stargate) contract that holds the NFT.
              minLength: 1
          required:
            - tokenId
            - stakingContractAddress
        - $ref: '#/components/schemas/StakeClaimRewardsIntent'
      description: |-
        Claim VTHO rewards accumulated by a VeChain staking NFT position. Rewards
        accrue in VTHO (VeChain's energy token) for each NFT held in the Stargate
        contract. Supply the NFT's token ID and the staking contract address. Gas is
        paid by the enterprise gas tank (VTHO).
    VetStakingIntent:
      title: VetStakingIntent
      allOf:
        - type: object
          properties:
            stakingContractAddress:
              type: string
              description: Address of the VeChain staking contract that will hold the staked VET.
              minLength: 1
            levelId:
              type: string
              description: Staking tier level in the VeChain contract. Determines reward rate and lock parameters.
              minLength: 1
          required:
            - stakingContractAddress
            - levelId
        - $ref: '#/components/schemas/StakeIntent'
        - $ref: '#/components/schemas/BaseIntentWithAmount'
      description: |-
        Activate a new VeChain staking position by depositing VET into the staking
        contract. Use `levelId` to select the staking tier. To add to an existing
        position, use `increaseStake` instead. All VeChain gas fees are paid by the
        enterprise gas tank (VTHO); the sender pays no gas.
    VetUnstakeCommonFields:
      title: VetUnstakeCommonFields
      type: object
      properties:
        tokenId:
          type: string
          description: ID of the staking NFT to operate on.
          minLength: 1
        stakingContractAddress:
          type: string
          description: Address of the VeChain staking (Stargate) contract that holds the NFT.
          minLength: 1
      required:
        - tokenId
        - stakingContractAddress
    VetValidatorRegistrationIntent:
      title: VetValidatorRegistrationIntent
      allOf:
        - type: object
          properties:
            validatorAddress:
              type: string
              description: Address of the validator node being registered. Must be a valid VeChain address.
              minLength: 1
            stakingPeriod:
              type: number
              enum:
                - 60480
                - 129600
                - 259200
              description: 'Duration of the staking lock period in blocks. Valid values: 60480 (~7 days), 129600 (~15 days), 259200 (~30 days).'
            stakingContractAddress:
              type: string
              description: Address of the VeChain staking contract to register the validator with.
              minLength: 1
          required:
            - validatorAddress
            - stakingPeriod
            - stakingContractAddress
        - $ref: '#/components/schemas/ValidatorRegistrationIntent'
        - $ref: '#/components/schemas/BaseIntentWithAmount'
      description: |-
        Register a new validator node in VeChain's staking contract by depositing a
        VET bond. The staking period determines the lock duration (60480, 129600, or
        259200 blocks). Gas is paid by the enterprise gas tank (VTHO).
    VetWithdrawStakeIntent:
      title: VetWithdrawStakeIntent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - withdrawStake
              description: Must be "withdrawStake".
            validatorAddress:
              type: string
              description: Address of the validator node whose staked VET is being withdrawn.
              minLength: 1
            stakingContractAddress:
              type: string
              description: Address of the VeChain staking contract holding the exited position.
              minLength: 1
          required:
            - intentType
            - validatorAddress
            - stakingContractAddress
        - $ref: '#/components/schemas/BaseStakeIntent'
      description: |-
        Withdraw a VeChain validator's staked VET after the cooldown period from a
        `signalExit` has completed. This is the second (final) step in the validator
        unstake flow. No VET is spent — staked VET is returned to the sender; gas is
        paid by the enterprise gas tank (VTHO).
    VoteDelegationIntent:
      title: Vote Delegation Intent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - voteDelegation
          required:
            - intentType
        - $ref: '#/components/schemas/BaseStakeIntent'
    Wallet1:
      type: object
      properties:
        admin:
          type: object
          properties:
            policy:
              $ref: '#/components/schemas/Policy1'
        allowBackupKeySigning:
          type: boolean
        approvalsRequired:
          $ref: '#/components/schemas/ApprovalsRequired'
        balanceString:
          allOf:
            - $ref: '#/components/schemas/IntegerString'
          description: Total balance in base units (e.g. Satoshis)
        buildDefaults:
          $ref: '#/components/schemas/WalletBuildDefaults'
        coin:
          $ref: '#/components/schemas/Coin'
        coinSpecific:
          $ref: '#/components/schemas/WalletCoinSpecific'
        custodialWallet:
          type: object
          description: The associated custodial wallet object
        custodialWalletId:
          $ref: '#/components/schemas/Id'
        deleted:
          type: boolean
        disableTransactionNotifications:
          type: boolean
        enterprise:
          $ref: '#/components/schemas/Id'
        freeze:
          type: object
          properties:
            time:
              type: string
              format: dateTime
            expires:
              type: string
              format: dateTime
            reason:
              type: string
              description: Reason why the wallet was frozen
              enum:
                - TxIntentMismatch
                - TxIntentMismatchRecipient
                - TxIntentMismatchContract
                - TxIntentMismatchApproval
                - UserRequest
                - AdminRequest
            referenceId:
              type: string
              description: Optional reference ID for tracking purposes
            adminOrUserId:
              type: string
              description: The user who froze the wallet
        id:
          $ref: '#/components/schemas/Id'
        isCold:
          type: boolean
        keys:
          $ref: '#/components/schemas/Keys'
        label:
          $ref: '#/components/schemas/WalletLabel'
        m:
          $ref: '#/components/schemas/NumSignatures'
        'n':
          $ref: '#/components/schemas/NumKeychains'
        nodeId:
          $ref: '#/components/schemas/Id'
        receiveAddress:
          $ref: '#/components/schemas/Address2'
        recoverable:
          type: boolean
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Id'
        spendableBalanceString:
          allOf:
            - $ref: '#/components/schemas/IntegerString'
          description: Spendable balance in base units (e.g. Satoshis)
        unspentCount:
          type: number
          example: 100
          description: Number of unspent outputs present in the wallet
        startDate:
          allOf:
            - $ref: '#/components/schemas/DateTime'
          description: Wallet creation time
        type:
          $ref: '#/components/schemas/WalletTypePublic'
        users:
          type: array
          items:
            $ref: '#/components/schemas/WalletUser'
        customChangeKeySignatures:
          $ref: '#/components/schemas/CustomChangeKeySignatures'
        multisigType:
          $ref: '#/components/schemas/WalletMultisigType'
        multisigTypeVersion:
          $ref: '#/components/schemas/MultisigTypeVersion1'
      required:
        - approvalsRequired
        - coin
        - deleted
        - disableTransactionNotifications
        - id
        - label
    WalletBuildDefaults:
      type: object
      properties:
        minFeeRate:
          type: integer
          minimum: 1000
          nullable: true
          example: 12000
          description: |
            (BTC only) The minimum fee rate (in base units) per kilobyte (or virtual kilobyte). For example, satoshis per kvByte. Must be greater than or equal to the default of 1000 satoshis/kvByte.

            Note: The you can override `minFeeRate` on a per transaction basis with the `feeRate` parameter.
        maxFeeRate:
          type: integer
          minimum: 1000
          nullable: true
          example: 18000
          description: |
            (BTC only) The maximum fee rate (in base units) per kilobyte (or virtual kilobyte). For example, satoshis per kvByte. The `maxFeeRate` limits the fee rate generated by both `feeMultiplier` and `numBlocks`.

            Note: The you can override `maxFeeRate` on a per transaction basis with the `feeRate` parameter.
        feeMultiplier:
          type: number
          minimum: 1
          nullable: true
          example: 1.2
          description: |
            (UTXO only) Custom multiplier to the `feeRate`. The resulting fee rate is limited by the `maxFeeRate`. For replace-by-fee (RBF) transactions (that include `rbfTxIds`), the `feeMultiplier` must be greater than 1, since it's an absolute fee multiplier to the transaction being replaced.

            Note: The `maxFeeRate` limits the fee rate generated by `feeMultiplier`.
        changeAddressType:
          $ref: '#/components/schemas/DefaultChangeAddressType'
        txFormat:
          type: string
          example: psbt
          enum:
            - legacy
            - psbt
            - psbt-lite
          description: |
            (UTXO only) The default transaction format to use for this wallet. Per transaction, you can override the default with the `txFormat` parameter.
        autoReserveUnspentsOnBuildMins:
          type: number
          minimum: 1
          nullable: true
          example: 60
          description: |
            (UTXO only) Automatically reserve unspents when building a transaction.
    WalletCoinSpecific:
      oneOf:
        - title: Wallet
          type: object
          properties:
            creationFailure:
              type: array
              items:
                $ref: '#/components/schemas/TxId'
              description: Includes list of fail initialization txids
            pendingChainInitialization:
              type: boolean
              description: Whether the wallet needs to be initialized on the chain
        - $ref: '#/components/schemas/WalletCoinSpecificBtc'
        - $ref: '#/components/schemas/WalletCoinSpecificCosmos'
        - $ref: '#/components/schemas/WalletCoinSpecificOfc'
        - $ref: '#/components/schemas/WalletCoinSpecificXlm'
    WalletCoinSpecificBtc:
      title: BTC
      type: object
      properties:
        allowQuantumUnsafeAddresses:
          type: boolean
          description: If true, the wallet allows creation of addresses which are vulnerable to quantum attacks. Defaults to false.
    WalletCoinSpecificCosmos:
      title: ATOM
      type: object
      properties:
        rootAddress:
          type: string
          description: Wallet address to send or receive assets.
          example: cosmos1uvrgkp82dmeks368d7g2ejzm3axhapzveh5uek
        lastChainIndex:
          type: number
          description: Index of last address that was derived.
          example: 1
        lastMemoId:
          type: string
          description: A running counter of the last known memo id. The first one is 0.
          example: '0'
        pendingEcdsaTssInitialization:
          type: boolean
          description: If true, this wallet cannot sign transactions or messages as the enterprise has not finished MPC setup.
          example: false
      required:
        - rootAddress
        - lastMemoId
    WalletCoinSpecificOfc:
      title: OFC
      type: object
      description: Coin-specific data for OFC (Go Account) wallets.
      properties:
        needsKeyReshareAfterPasswordReset:
          type: boolean
          description: |
            True if all users need to recover the user key. Set to true after a successful
            password reset with support.
        pendingSystemInitialization:
          type: boolean
          description: |
            True if the wallet is still pending initialization. While true, users cannot
            create addresses or initiate withdrawals.
        userKeySigningRequired:
          type: boolean
          description: |
            True if the wallet requires user signatures for all transactions and refuses BitGo
            KMS signing. Defaults to true when not explicitly set. Only applicable for OFC wallets.
    WalletCoinSpecificXlm:
      title: XLM
      type: object
      properties:
        rootAddress:
          type: string
          description: Root address of the wallet
          example: GCTTCPH4IIDK7P72FFAEJ3ZFN6WDHJH6GGMRPHPM56ZWGIQ7B3XTIJAM
        stellarUsername:
          type: string
          description: Username for the user's Stellar address
          example: foo_bar@baz.com
        homeDomain:
          type: string
          description: Home domain of a Stellar account
          example: bitgo.com
        stellarAddress:
          type: string
          description: Email-like address associated to a Stellar account
          example: foo_bar@baz.com*bitgo.com
    WalletIdString:
      title: WalletIdString
      type: string
      example: 59cd72485007a239fb00282ed480da1f
      pattern: ^[0-9a-f]{32}$
    WalletLabel:
      type: string
      example: My Wallet
    WalletMultisigType:
      type: string
      enum:
        - onchain
        - tss
    WalletPermission:
      type: string
      description: |
        Comma-separated list of privileges for a wallet. Includes:

              - `admin` - Can manage wallet policies and users and approve or reject pending approvals.
              - `freeze` - Can freeze a wallet, disabling all withdrawals.
              - `spend` - Can initiate withdrawals and generate new receive addresses.
              - `trade` - Can initiate trades from a Go Account (`trading` wallet type).
              - `view` - Can view balances and transactions.

        Permissions don't overlap. Required parameter if 'reshare' is false.
      enum:
        - admin
        - spend
        - trade
        - view
      example: spend,view
    WalletRecoveryIntent:
      title: Wallet Recovery Intent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - walletRecovery
          required:
            - intentType
        - $ref: '#/components/schemas/BaseIntent'
    WalletRecoveryIntent1:
      title: Wallet Recovery
      type: object
      properties:
        intentType:
          type: string
        sequenceId:
          type: string
          description: |
            A `sequenceId` is a unique and arbitrary wallet identifier applied to transfers and transactions at creation. It is optional but highly recommended. With a `sequenceId` you can easily reference transfers and transactions&mdash;for example, to safely retry sending. Because BitGo only confirms one send request per `sequenceId` (and fails all subsequent attempts), you can retry sending without the risk of double spending. The `sequenceId` is only visible to users on the wallet and is not shared publicly. It is the responsibility of the caller to keep track of this ID.
          example: abc123
        comment:
          type: string
          description: The `comment` is only visible to users on the wallet and is not shared publicly.
      required:
        - intentType
    WalletShareKeychain:
      type: object
      description: Key passed to the receiving user, included if the wallet was shared with spend permission
      properties:
        pub:
          description: One of wallet pub (onchain) or commonKeychain (MPC)
          type: string
        encryptedPrv:
          description: Private key of the user sharing the wallet encrypted under their wallet passphrase
          type: string
        fromPubKey:
          description: Derived public key of the user sharing the wallet
          type: string
        toPubKey:
          description: Derived public key of the user receiving the share
          type: string
        path:
          description: BIP32 HD path of the derived public keys (fromPubKey and toPubKey)
          example: m/1234/1/1
          type: string
    WalletShareState1:
      type: string
      example: active
      enum:
        - pendingapproval
        - active
        - accepted
        - canceled
        - rejected
    WalletType1:
      title: WalletType
      type: object
      properties:
        id:
          type: string
          description: Wallet ID
          example: 59cd72485007a239fb00282ed480da1f
          pattern: ^[0-9a-f]{32}$
        users:
          type: array
          items:
            type: object
            properties:
              user:
                type: string
              permissions:
                type: array
                items:
                  type: string
            required:
              - user
              - permissions
            description: Ids of users with access to the wallet
        coin:
          type: string
          description: Name of the blockchain the wallet is on
          example: tbtc4
        label:
          type: string
          description: Name the user assigned to the wallet
          example: My TBTC4 Wallet
        m:
          type: number
          description: Number of signatures required for the wallet to send
          example: 2
        'n':
          type: number
          description: Number of signers on the wallet
          example: 3
        keys:
          type: array
          example:
            - 59cd72485007a239fb00282ed480da1f
          items:
            type: string
            description: Ids of wallet keys
        keySignatures:
          type: object
          additionalProperties: {}
          description: Signatures for the backup and BitGo public keys signed by the user key
        enterprise:
          type: string
        organization:
          type: string
        bitgoOrg:
          type: string
        tags:
          type: array
          example:
            - 59cd72485007a239fb00282ed480da1f
          items:
            type: string
            description: Tags set on the wallet
        disableTransactionNotifications:
          type: boolean
          description: Flag for disabling wallet transaction notifications
          example: false
        freeze:
          type: object
          additionalProperties: {}
          description: Freeze state (used to stop the wallet from spending)
          example: {}
        deleted:
          type: boolean
          description: Flag which indicates the wallet has been deleted
          example: false
        approvalsRequired:
          type: number
          description: Number of admin approvals required for an action to fire
          example: 1
        isCold:
          type: boolean
          description: Flag for identifying cold wallets
          example: false
        coinSpecific:
          type: object
          additionalProperties: {}
          description: Coin-specific data
        admin:
          type: object
          additionalProperties: {}
          description: Admin data (wallet policies)
          example: {}
        allowBackupKeySigning:
          type: boolean
          description: Flag for allowing signing with backup key
          example: false
        clientFlags:
          type: array
          items:
            type: string
        recoverable:
          type: boolean
          description: Flag indicating whether this wallet's user key is recoverable with the passphrase held by the user.
        startDate:
          type: string
          description: Time when this wallet was created
        hasLargeNumberOfAddresses:
          type: boolean
          description: Flag indicating that this wallet is large (more than 100,000 addresses). If this is set, some APIs may omit properties which are expensive to calculate for wallets with many addresses (for example, the total address counts returned by the List Addresses API).
        config:
          type: object
          additionalProperties: {}
          description: Custom configuration options for this wallet
        balanceString:
          type: string
          description: Wallet balance as string
          example: '0'
        confirmedBalanceString:
          type: string
          description: Confirmed wallet balance as string
          example: '0'
        spendableBalanceString:
          type: string
          description: Spendable wallet balance as string
          example: '0'
        receiveAddress:
          type: object
          properties:
            id:
              type: string
            address:
              type: string
            chain:
              type: number
            index:
              type: number
            coin:
              type: string
            wallet:
              type: string
            coinSpecific:
              type: object
              additionalProperties: {}
          required:
            - id
            - address
            - chain
            - index
            - coin
            - wallet
            - coinSpecific
        balance:
          type: number
          description: Wallet balance as number
          example: 0
        rbfBalance:
          type: number
        rbfBalanceString:
          type: string
        reservedBalanceString:
          type: string
        lockedBalanceString:
          type: string
        stakedBalanceString:
          type: string
        unspentCount:
          type: number
        pendingChainInitialization:
          type: boolean
        pendingEcdsaTssInitialization:
          type: boolean
        pendingApprovals:
          type: array
          items:
            type: object
            additionalProperties: {}
        multisigType:
          type: string
        multisigTypeVersion:
          type: string
        type:
          type: string
        subType:
          type: string
        creator:
          type: string
        walletFullyCreated:
          type: boolean
      required:
        - id
        - users
        - coin
        - label
        - m
        - 'n'
        - keys
        - keySignatures
        - enterprise
        - organization
        - bitgoOrg
        - tags
        - disableTransactionNotifications
        - freeze
        - deleted
        - approvalsRequired
        - isCold
        - coinSpecific
        - admin
        - allowBackupKeySigning
        - clientFlags
        - recoverable
        - startDate
        - hasLargeNumberOfAddresses
        - config
        - balanceString
        - confirmedBalanceString
        - spendableBalanceString
        - receiveAddress
    WalletTypePublic:
      type: string
      description: The type describes who owns the keys to the wallet and how they are stored. `cold` wallets are wallets where the private key of the user key is stored exclusively outside of BitGo's system. `custodial` means that this wallet is a cold wallet where BitGo owns the keys. Only customers of the BitGo Trust can create this kind of wallet. `custodialPaired` means that this is a hot wallet that is owned by the customer but it will be linked to a cold (custodial) wallet where BitGo owns the keys. This option is only available to customers of BitGo Inc. BitGo stores an encrypted private key for the user key of `hot` wallets. `trading` wallets are trading accounts where the coin is `ofc`. `distributedCustody` means You manage one key and another key agent manages the second key. BitGo manages the third key
      enum:
        - cold
        - custodial
        - custodialPaired
        - hot
        - trading
        - distributedCustody
        - advanced
