    CosmosStakeIntent:
      title: Cosmos Stake Intent
      allOf:
        - type: object
          properties:
            intentType:
              type: string
              enum:
                - delegate
            validatorAddress:
              type: string
              description: Bech32 validator address to delegate tokens to (e.g. cosmosvaloper1...).
            recipients:
              type: array
              items:
                type: object
                properties:
                  address:
                    $ref: '#/components/schemas/Address'
                  amount:
                    $ref: '#/components/schemas/Amount'
                  data:
                    $ref: '#/components/schemas/optionalString'
                required:
                  - address
                  - amount
                description: Optional list of validator–amount pairs for multi-validator delegation. When provided, overrides validatorAddress and amount.
          required:
            - intentType
            - validatorAddress
        - $ref: '#/components/schemas/BaseStakeIntent'
        - $ref: '#/components/schemas/BaseIntentWithAmount'
      description: |-
        Delegate (stake) tokens to one or more validators on a Cosmos-family
        chain. Use `validatorAddress` and `amount` for a single validator, or
        `recipients` for multi-validator delegation in a single transaction.
    CosmosSwitchValidatorIntent:
      title: Cosmos Switch Validator Intent
      allOf:
        - $ref: '#/components/schemas/StakeSwitchValidatorIntent'
      description: |-
        Atomically move a delegation from one validator to another (redelegate)
        on a Cosmos-family chain. The redelegation is subject to the chain's
        redelegation cooldown rules.
    CosmosUnstakeIntent:
