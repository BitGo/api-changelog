  /api/v1/{coin}/advancedwallet/recovery:
    post:
      summary: Advanced Wallets - Recover Assets
      description: |-
        Recover assets from an advanced wallet with a balance only in the base address. Works for both multisignature and MPC recoveries.

        Retrieves the private keys from KMS using the provided public keys or common keychain, then signs and returns the broadcastable transaction hex.

        Note: This endpoint only works when AWM and MBE are running in recovery mode.

        To recover assets from an advanced wallet with balances in multiple receive addresses, use [Advanced Wallets - Consolidate and Recover Assets](https://developers.bitgo.com/reference/advancedwalletconsolidaterecovery).

        Use this endpoint only with advanced wallets. For other wallet types, use the [Wallet Recovery Wizard](https://developers.bitgo.com/docs/wallets-recover#/).
      operationId: advancedwallet.recovery
      tags:
        - Advanced Wallets
      parameters:
        - name: coin
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Request type for the wallet recovery endpoint. Used to recover funds from both standard multisig and TSS wallets. Recover funds from an advanced wallet by building a transaction with user and backup keys.
              properties:
                isTssRecovery:
                  type: boolean
                  description: Set to true to perform a TSS (Threshold Signature Scheme) recovery.
                  example: true
                tssRecoveryParams:
                  type: object
                  description: Parameters specific to TSS recovery. Required when isTssRecovery is true.
                  properties:
                    commonKeychain:
                      type: string
                      description: The common keychain string used for TSS wallets. Required for TSS recovery.
                      example: 0280ec751d3b165a48811b2cc90f90dcf323f33e8bcaadc0341e1e010adcdcf7005afde80dd286d65b6be947af0424dd1e9f7611f3d20e02a4fc84ad8c8b74c1a5
                  required:
                    - commonKeychain
                multiSigRecoveryParams:
                  type: object
                  description: Parameters specific to standard multisig recovery. Required when isTssRecovery is false (default).
                  properties:
                    backupPub:
                      type: string
                      description: The backup public key.
                      example: xpub661MyMwAqRbcGCNnmzqt3u5KhxmXBHiC78cwAyUMaKJXpFDfHpJwNap6qpG1Kz2SPexKXy3akhPQz7GDYWpHNWkLxRLj6bDxQSf74aTAP9y
                    bitgoPub:
                      type: string
                      description: The BitGo public key. Required for UTXO coins, optional for others.
                      example: xpub661MyMwAqRbcGCNnmzqt3u5KhxmXBHiC78cwAyUMaKJXpFDfHpJwNap6qpG1Kz2SPexKXy3akhPQz7GDYWpHNWkLxRLj6bDxQSf74aTAP9y
                    userPub:
                      type: string
                      description: The user's public key.
                      example: xpub661MyMwAqRbcGCNnmzqt3u5KhxmXBHiC78cwAyUMaKJXpFDfHpJwNap6qpG1Kz2SPexKXy3akhPQz7GDYWpHNWkLxRLj6bDxQSf74aTAP9y
                    walletContractAddress:
                      type: string
                      description: The wallet contract address. Required for ETH-like recoveries.
                      example: '0x1234567890123456789012345678901234567890'
                  required:
                    - backupPub
                    - bitgoPub
                    - userPub
                    - walletContractAddress
                recoveryDestinationAddress:
                  type: string
                  description: The address where recovered funds will be sent. Must be a valid address for the coin being recovered.
                  example: '"9zvKDB8o96QvToQierXtwSfqK9NqaHw7uvmxWsmSrxns" // For SOL'
                apiKey:
                  type: string
                  description: API Key for a block chain explorer. Required for some coins (BTC, ETH) to build a recovery transaction without BitGo.
                coinSpecificParams:
                  type: object
                  description: 'Coin-specific recovery options. Different parameters are required based on the coin family: - For UTXO coins (BTC, etc): provide utxoRecoveryOptions. - For EVM chains (ETH, etc): provide evmRecoveryOptions. - For Solana: provide solanaRecoveryOptions.'
                  properties:
                    ecdsaCosmosLikeRecoverySpecificParams:
                      type: object
                      properties:
                        rootAddress:
                          type: string
                      required:
                        - rootAddress
                    ecdsaEthLikeRecoverySpecificParams:
                      type: object
                      properties:
                        apiKey:
                          type: string
                        bitgoDestinationAddress:
                          type: string
                        walletContractAddress:
                          type: string
                      required:
                        - apiKey
                        - bitgoDestinationAddress
                        - walletContractAddress
                    evmRecoveryOptions:
                      type: object
                      description: EVM-specific recovery parameters for Ethereum and EVM-compatible chains. Used for recovering funds from standard multisig wallets on Ethereum and EVM-compatible chains. Required when recovering ETH, MATIC, BSC, AVAX C-Chain, etc.
                      properties:
                        eip1559:
                          type: object
                          description: EIP-1559 gas parameters for modern Ethereum transactions. Required for EIP-1559 compatible networks (Ethereum post-London fork).
                          properties:
                            maxFeePerGas:
                              type: number
                              description: Maximum fee per gas in wei (base fee + priority fee).
                              example: null
                            maxPriorityFeePerGas:
                              type: number
                              description: Maximum priority fee per gas in wei (tip for miners/validators).
                              example: null
                          required:
                            - maxFeePerGas
                            - maxPriorityFeePerGas
                        gasLimit:
                          type: number
                          description: Gas limit for the recovery transaction. Must be enough to cover the contract execution costs.
                          example: 500000
                        gasPrice:
                          type: number
                          description: Gas price in wei for the recovery transaction (for legacy transactions). Higher gas prices result in faster confirmations but higher transaction costs.
                          example: null
                        replayProtectionOptions:
                          type: object
                          description: Replay protection options for the transaction. Required to prevent transaction replay attacks across different chains.
                          properties:
                            chain:
                              oneOf:
                                - type: string
                                - type: number
                              description: Chain ID or name.
                              example: '"goerli" // Goerli Testnet'
                            hardfork:
                              type: string
                              default: london
                              description: Hardfork name to determine the transaction format.
                              example: '"istanbul" // Pre-London fork'
                          required:
                            - chain
                            - hardfork
                        scan:
                          type: number
                          default: 20
                          description: Number of addresses to scan for funds. Higher values will scan more addresses but take longer to complete.
                          example: null
                    solanaRecoveryOptions:
                      type: object
                      description: Solana-specific recovery parameters.
                      properties:
                        closeAtaAddress:
                          type: string
                          description: The close associated token account address. Required for token recovery.
                        durableNonce:
                          type: object
                          description: Durable nonce configuration for transaction durability. Optional but recommended for recovery operations. Refer to https://github.com/BitGo/wallet-recovery-wizard/blob/master/DURABLE_NONCE.md on durable nonce creation.
                          properties:
                            publicKey:
                              type: string
                              description: The public key of the durable nonce account.
                            secretKey:
                              type: string
                              description: The secret key of the durable nonce account.
                          required:
                            - publicKey
                            - secretKey
                        programId:
                          type: string
                          description: The program ID for the token. Required for token recovery.
                        recoveryDestinationAtaAddress:
                          type: string
                          description: The recovery destination's associated token account address. Required for token recovery.
                        tokenContractAddress:
                          type: string
                          description: The token contract address for token recovery. Required when recovering tokens.
                    utxoRecoveryOptions:
                      type: object
                      description: UTXO-specific recovery parameters for Bitcoin & Bitcoin-like cryptocurrencies. Used for recovering funds from standard multisig wallets on UTXO chains. Required when recovering BTC, BCH, LTC, DASH, ZEC, etc.
                      properties:
                        feeRate:
                          type: number
                          description: Fee rate for the recovery transaction in satoshis per byte. Higher fee rates result in faster confirmations but higher transaction costs.
                          example: null
                        ignoreAddressTypes:
                          type: array
                          example:
                            - p2sh-p2wsh
                            - p2wsh
                          items:
                            type: string
                            description: Array of address types to ignore during recovery. Useful when you want to exclude specific address types from the recovery process.
                        scan:
                          type: number
                          description: Number of addresses to scan for funds. Higher values will scan more addresses but take longer to complete.
                          example: null
                        userKeyPath:
                          type: string
                          default: m/0
                          description: Derivation path for the user key. Specifies the HD path to derive the correct user key for signing.
                          example: m/0/0/0/0
              required:
                - recoveryDestinationAddress
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: Successful recovery response.
                example:
                  txHex: 
                properties:
                  txHex:
                    type: string
                    description: The full signed transaction in hexadecimal format. This transaction can be broadcast to the network to complete the recovery.
                required:
                  - txHex
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/{coin}/advancedwallet/recoveryconsolidations:
    post:
      summary: Advanced Wallets - Consolidate and Recover Assets
      description: |-
        Recover assets from an advanced wallet with a balance in multiple receive addresses. Build, sign, and send a consolidation and recovery, all in one call. Sign using your user and backup keys. Works for both multisignature and MPC recoveries.

        Retrieves the private keys from KMS using the provided public keys or common keychain, then signs and returns the broadcastable transaction hex.

        Note: This endpoint only works when AWM and MBE are running in recovery mode.

        To recover assets from an advanced wallet with a balance only in the base address, use [Advanced Wallets - Recover Assets](https://developers.bitgo.com/reference/advancedwalletrecovery).

        Use this endpoint only with advanced wallets. For other wallet types, use the [Wallet Recovery Wizard](https://developers.bitgo.com/docs/wallets-recover#/).
      operationId: advancedwallet.consolidate.recovery
      tags:
        - Advanced Wallets
      parameters:
        - name: coin
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Request type for wallet recovery consolidations endpoint. Used to consolidate and recover funds from multiple addresses in a wallet, via signing with user and backup keys.
              properties:
                userPub:
                  type: string
                  description: The user's public key for standard multisig wallets. Required for onchain multisig recovery consolidations.
                  example: xpub661MyMwAqRbcGCNnmzqt3u5KhxmXBHiC78cwAyUMaKJXpFDfHpJwNap6qpG1Kz2SPexKXy3akhPQz7GDYWpHNWkLxRLj6bDxQSf74aTAP9y
                backupPub:
                  type: string
                  description: The backup public key for standard multisig wallets. Required for onchain multisig recovery consolidations.
                  example: xpub661MyMwAqRbcGCNnmzqt3u5KhxmXBHiC78cwAyUMaKJXpFDfHpJwNap6qpG1Kz2SPexKXy3akhPQz7GDYWpHNWkLxRLj6bDxQSf74aTAP9y
                bitgoPub:
                  type: string
                  description: The BitGo public key for standard multisig wallets. Required for onchain UTXO multisig recovery consolidations.
                  example: xpub661MyMwAqRbcGCNnmzqt3u5KhxmXBHiC78cwAyUMaKJXpFDfHpJwNap6qpG1Kz2SPexKXy3akhPQz7GDYWpHNWkLxRLj6bDxQSf74aTAP9y
                multisigType:
                  type: string
                  enum:
                    - onchain
                    - tss
                  description: 'The type of wallet to recover - onchain: Traditional multisig wallets. - tss: Threshold Signature Scheme wallets.'
                  example: onchain
                commonKeychain:
                  type: string
                  description: The common keychain for TSS wallets. Required when multisigType is 'tss'.
                  example: 0280ec751d3b165a48811b2cc90f90dcf323f33e8bcaadc0341e1e010adcdcf7005afde80dd286d65b6be947af0424dd1e9f7611f3d20e02a4fc84ad8c8b74c1a5
                tokenContractAddress:
                  type: string
                  description: The token contract address for token recovery (e.g., ERC20 tokens on Ethereum or SPL tokens on Solana). Required when recovering specific tokens instead of the native coin.
                  example: '"EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v" // USDC on Solana'
                startingScanIndex:
                  type: number
                  description: The starting index to scan for addresses to consolidate. Useful for limiting the scan range for better performance.
                  example: 0
                endingScanIndex:
                  type: number
                  default: 20
                  description: The ending index to scan for addresses to consolidate. Useful for limiting the scan range for better performance.
                  example: 100
                apiKey:
                  type: string
                  description: API key for blockchain explorer services. Required for some coins to build recovery transactions.
                  example: v2x8d5e46cf15a7b9b7xc60685d4f56xd8bd5f5cdcef3c1e9d4399c955d587179b
                durableNonces:
                  type: object
                  description: Durable nonces configuration for Solana transactions. Provides transaction durability for Solana recovery operations. Refer to https://github.com/BitGo/wallet-recovery-wizard/blob/master/DURABLE_NONCE.md on durable nonce creation.
                  properties:
                    publicKeys:
                      type: array
                      example:
                        - BurablNonc1234567890123456789012345678901
                        - BurablNonc1234567890123456789012345678902
                      items:
                        type: string
                        description: Array of public keys associated with the durable nonce.
                    secretKey:
                      type: string
                      description: The secret key of the durable nonce account.
                      example: 3XNrU5JSPs2VnZCLnWK8GDzB6Pqoy3tYNMJJVesKBXnGqRxwdXDg2QKgv7E9a6QbAiKnLHSxysKWgXDKNdfXZCQM
                  required:
                    - publicKeys
                    - secretKey
              required:
                - multisigType
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '501':
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
